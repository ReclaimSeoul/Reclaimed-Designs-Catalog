name: Build catalog

on:
  push:
    paths:
      - "designs/**"
      - "scripts/build_catalog.mjs"
      - "package.json"
      - ".github/workflows/build-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build catalog
        run: npm run build:catalog

      - name: Commit generated catalog
        run: |
          git add README.md catalog.json 'designs/**/README.md'

          if git diff --cached --quiet; then
            echo "Catalog is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Build design catalog [skip ci]"
          git push
